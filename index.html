<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SoloNet v5.0 — Система ролей (Создатель/Админ/Помощник)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s;
        }

        body.light {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light .glass-container {
            background: rgba(255, 255, 255, 0.7);
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .user-role {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }

        .role-creator { background: #ffd700; color: #000; }
        .role-admin { background: #ff4444; color: #fff; }
        .role-helper { background: #4caf50; color: #fff; }
        .role-user { background: #666; color: #fff; }

        body.light .user-name { color: #2d3748; }

        .user-status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .nav-menu {
            flex: 1;
            padding: 20px;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }

        body.light .nav-item { color: #2d3748; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .chat-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title { font-size: 20px; font-weight: 600; color: white; }
        body.light .chat-title { color: #2d3748; }

        .online-badge { font-size: 12px; color: #4caf50; margin-left: 8px; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            animation: fadeInUp 0.3s ease;
            position: relative;
        }

        .message.mine {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border-bottom-left-radius: 4px;
        }

        body.light .message.other {
            background: rgba(0, 0, 0, 0.1);
            color: #2d3748;
        }

        .message-author {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .author-role-badge {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .message-text { font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.6; text-align: right; margin-top: 4px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            outline: none;
        }

        body.light .input-area input {
            background: rgba(0, 0, 0, 0.1);
            color: #2d3748;
        }

        .input-area input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-content h2 { color: white; margin-bottom: 20px; text-align: center; }
        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .modal-content button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .sync-status {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: #4caf50;
            z-index: 100;
            cursor: pointer;
        }

        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
            }
            .sidebar.open { left: 0; }
            .message { max-width: 85%; }
        }

        select, .role-select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glass-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="avatar">👤</div>
                <div class="user-name" id="userName">Гость</div>
                <div class="user-status" id="userRoleBadge"></div>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" onclick="switchChat('global')">💬 Общий чат</div>
                <div class="nav-item" onclick="openChannels()">📢 Каналы</div>
                <div class="nav-item" onclick="openSearch()">🔍 Поиск</div>
                <div class="nav-item" onclick="openAdmin()">⚙️ Админ-панель</div>
                <div class="nav-item" onclick="openRolePanel()">👑 Управление ролями</div>
                <div class="nav-item" onclick="logout()">🚪 Выйти</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button class="menu-btn" onclick="toggleSidebar()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">☰</button>
                    <div class="chat-title" id="chatTitle">Общий чат <span class="online-badge">● онлайн</span></div>
                </div>
                <button onclick="openSettings()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">⚙️</button>
            </div>
            <div class="messages-container" id="messagesContainer">💬 Загрузка...</div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div class="sync-status" id="syncStatus">🔄 Подключение к Supabase...</div>

    <!-- Модальные окна -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 Вход / Регистрация</h2>
            <input type="text" id="regNick" placeholder="Никнейм">
            <input type="text" id="regUsername" placeholder="@username">
            <input type="password" id="regPass" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <hr style="margin: 16px 0; border-color: rgba(255,255,255,0.1);">
            <input type="text" id="loginNick" placeholder="Никнейм">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <div class="modal" id="rolePanelModal">
        <div class="modal-content">
            <h2>👑 Управление ролями</h2>
            <div id="rolePanelContent"></div>
            <button onclick="closeModal('rolePanelModal')">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <h2>🔧 Админ-панель</h2>
            <input type="password" id="adminPassword" placeholder="Пароль">
            <button onclick="adminLogin()">Войти</button>
            <button onclick="closeModal('adminModal')">Отмена</button>
        </div>
    </div>

    <div class="modal" id="adminMenuModal">
        <div class="modal-content">
            <h2>⚙️ Панель управления</h2>
            <div id="adminButtons"></div>
            <button onclick="closeModal('adminMenuModal')">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="channelsModal">
        <div class="modal-content">
            <h2>📢 Каналы</h2>
            <div id="channelsList"></div>
            <button onclick="closeModal('channelsModal')">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="searchModal">
        <div class="modal-content">
            <h2>🔍 Поиск</h2>
            <input type="text" id="searchQuery" placeholder="Никнейм">
            <button onclick="searchUsers()">Найти</button>
            <div id="searchResults"></div>
            <button onclick="closeModal('searchModal')">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Настройки</h2>
            <button onclick="changeTheme()">🎨 Сменить тему</button>
            <button onclick="clearChat()">🗑 Очистить чат</button>
            <button onclick="closeModal('settingsModal')">Закрыть</button>
        </div>
    </div>

    <script>
        // ========== SUPABASE НАСТРОЙКИ ==========
        const SUPABASE_URL = 'https://rxtbyaeoqyrvznoedfbx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4dGJ5YWVvcXlydnpub2VkZmJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDU5NTAsImV4cCI6MjA5NTEyMTk1MH0.KkZI1XwLBG_UvWYBwXNTceH8iXuB_vxRJMg9uOxjsI';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Роли: creator (создатель), admin (админ), helper (помощник), user (пользователь)
        let currentUser = null;
        let currentChat = 'global';
        let messageSubscription = null;
        let theme = localStorage.getItem('solonet_theme') || 'dark';
        let isCreator = false;
        let isAdmin = false;
        let isHelper = false;

        // Применение темы
        function applyTheme() {
            if (theme === 'light') {
                document.body.classList.add('light');
            } else {
                document.body.classList.remove('light');
            }
        }

        // Получение роли
        function getUserRole(user) {
            if (!user) return 'user';
            if (user.nickname === 'vl1doff') return 'creator';
            if (user.role === 'admin') return 'admin';
            if (user.role === 'helper') return 'helper';
            return 'user';
        }

        // Отображение роли
        function getRoleBadge(role) {
            const roleNames = {
                creator: '👑 Создатель',
                admin: '⚡ Админ',
                helper: '🛡️ Помощник',
                user: '👤 Пользователь'
            };
            const roleClasses = {
                creator: 'role-creator',
                admin: 'role-admin',
                helper: 'role-helper',
                user: 'role-user'
            };
            return `<span class="user-role ${roleClasses[role]}">${roleNames[role]}</span>`;
        }

        // Обновление интерфейса пользователя
        function updateUserUI() {
            if (!currentUser) return;
            const role = getUserRole(currentUser);
            document.getElementById('userName').textContent = currentUser.nickname;
            document.getElementById('userRoleBadge').innerHTML = getRoleBadge(role);
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ТАБЛИЦ ==========
        async function initTables() {
            const { error } = await supabase.from('users').select('id').limit(1);
            if (error && error.code === '42P01') {
                updateSyncStatus('⚠️ Создайте таблицы через SQL Editor', false);
            } else {
                // Проверяем наличие колонки role
                const { data: columns } = await supabase.rpc('get_table_columns', { table_name: 'users' }).catch(() => null);
                if (!columns || !columns.find(c => c.column_name === 'role')) {
                    await supabase.rpc('add_role_column').catch(async () => {
                        // Если RPC нет, пробуем прямой SQL через REST (может не сработать)
                        console.log('Нужно добавить колонку role вручную');
                    });
                }
                updateSyncStatus('✅ Supabase готов', true);
            }
        }

        // ========== РАБОТА С СООБЩЕНИЯМИ ==========
        async function loadMessages() {
            if (!currentUser) return;
            
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .eq('chat_id', currentChat)
                    .order('created_at', { ascending: true })
                    .limit(200);
                
                if (error) throw error;
                renderMessages(data || []);
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">💬 Нет сообщений</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const userRole = msg.user_role || 'user';
                const roleName = { creator: '👑', admin: '⚡', helper: '🛡️', user: '' }[userRole] || '';
                return `
                    <div class="message ${msg.user_nickname === currentUser?.nickname ? 'mine' : 'other'}">
                        ${msg.user_nickname !== currentUser?.nickname ? `
                            <div class="message-author">
                                ${escapeHtml(msg.user_nickname)}
                                ${roleName ? `<span class="author-role-badge">${roleName}</span>` : ''}
                            </div>
                        ` : ''}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (!currentUser) { showLoginModal(); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            try {
                const { error } = await supabase
                    .from('messages')
                    .insert([{
                        chat_id: currentChat,
                        user_id: currentUser.id,
                        user_nickname: currentUser.nickname,
                        user_role: getUserRole(currentUser),
                        text: text,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                input.value = '';
            } catch (error) {
                console.error('Send error:', error);
                alert('Ошибка отправки');
            }
        }

        // ========== АВТОРИЗАЦИЯ С РОЛЯМИ ==========
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        async function register() {
            const nickname = document.getElementById('regNick').value.trim();
            let username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPass').value.trim();
            
            if (!nickname || !username || !password) {
                alert('Заполните все поля');
                return;
            }
            if (!username.startsWith('@')) username = '@' + username;
            
            // Определяем роль при регистрации
            let role = 'user';
            if (nickname === 'vl1doff') {
                role = 'creator';
            } else if (nickname === 'Admin') {
                role = 'admin';
            }
            
            try {
                const { data: existing } = await supabase
                    .from('users')
                    .select('nickname')
                    .eq('nickname', nickname)
                    .single();
                
                if (existing) {
                    alert('Никнейм уже занят');
                    return;
                }
                
                const { error } = await supabase
                    .from('users')
                    .insert([{
                        nickname: nickname,
                        username: username,
                        password: btoa(password),
                        role: role,
                        avatar: '👤',
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                
                alert('Регистрация успешна! Теперь войдите');
                document.getElementById('regNick').value = '';
                document.getElementById('regUsername').value = '';
                document.getElementById('regPass').value = '';
            } catch (error) {
                console.error('Register error:', error);
                alert('Ошибка регистрации');
            }
        }

        async function login() {
            const nickname = document.getElementById('loginNick').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const hashedPass = btoa(password);
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('nickname', nickname)
                    .eq('password', hashedPass)
                    .single();
                
                if (error || !data) {
                    alert('Неверный никнейм или пароль');
                    return;
                }
                
                currentUser = {
                    id: data.id,
                    nickname: data.nickname,
                    username: data.username,
                    role: data.role || 'user'
                };
                
                const userRole = getUserRole(currentUser);
                isCreator = userRole === 'creator';
                isAdmin = userRole === 'creator' || userRole === 'admin';
                isHelper = userRole === 'helper' || isAdmin;
                
                localStorage.setItem('solonet_current_user', JSON.stringify(currentUser));
                
                document.getElementById('loginModal').classList.remove('active');
                updateUserUI();
                
                await loadMessages();
                setupRealtimeSubscription();
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка входа');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('solonet_current_user');
            if (messageSubscription) messageSubscription.unsubscribe();
            document.getElementById('userName').textContent = 'Гость';
            document.getElementById('userRoleBadge').innerHTML = '';
            document.getElementById('messagesContainer').innerHTML = '<div style="text-align: center; padding: 40px;">💬 Войдите чтобы начать</div>';
            showLoginModal();
        }

        // ========== УПРАВЛЕНИЕ РОЛЯМИ (ТОЛЬКО ДЛЯ СОЗДАТЕЛЯ) ==========
        async function openRolePanel() {
            if (!currentUser) {
                alert('Сначала войдите');
                return;
            }
            
            const userRole = getUserRole(currentUser);
            if (userRole !== 'creator') {
                alert('❌ Только Создатель (vl1doff) может управлять ролями!');
                return;
            }
            
            // Загружаем всех пользователей
            const { data: users, error } = await supabase.from('users').select('*');
            if (error) {
                alert('Ошибка загрузки пользователей');
                return;
            }
            
            const container = document.getElementById('rolePanelContent');
            container.innerHTML = `
                <h3>👥 Управление ролями</h3>
                ${users.map(u => `
                    <div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; margin-bottom: 10px;">
                        <div><strong>${escapeHtml(u.nickname)}</strong> (${escapeHtml(u.username)})</div>
                        <select id="role_${u.id}" class="role-select">
                            <option value="user" ${(u.role || 'user') === 'user' ? 'selected' : ''}>👤 Пользователь</option>
                            <option value="helper" ${u.role === 'helper' ? 'selected' : ''}>🛡️ Помощник</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>⚡ Админ</option>
                            <option value="creator" ${u.role === 'creator' ? 'selected' : ''} ${u.nickname === 'vl1doff' ? 'disabled' : ''}>👑 Создатель</option>
                        </select>
                        <button onclick="updateUserRole('${u.id}', '${u.nickname}')" style="margin-top: 8px; padding: 8px; font-size: 12px;">💾 Сохранить роль</button>
                    </div>
                `).join('')}
                <hr>
                <div style="margin-top: 15px;">
                    <h4>📝 Информация о ролях:</h4>
                    <ul style="font-size: 12px; margin-top: 10px;">
                        <li><span class="role-creator" style="display: inline-block; padding: 2px 8px;">👑 Создатель</span> - полный доступ, может назначать роли</li>
                        <li><span class="role-admin" style="display: inline-block; padding: 2px 8px;">⚡ Админ</span> - может управлять чатом, каналами, банить</li>
                        <li><span class="role-helper" style="display: inline-block; padding: 2px 8px;">🛡️ Помощник</span> - может отправлять системные сообщения</li>
                        <li><span class="role-user" style="display: inline-block; padding: 2px 8px;">👤 Пользователь</span> - обычный участник</li>
                    </ul>
                </div>
            `;
            
            document.getElementById('rolePanelModal').classList.add('active');
        }
        
        async function updateUserRole(userId, nickname) {
            const select = document.getElementById(`role_${userId}`);
            const newRole = select.value;
            
            if (nickname === 'vl1doff' && newRole !== 'creator') {
                alert('❌ Нельзя изменить роль Создателя!');
                return;
            }
            
            const { error } = await supabase
                .from('users')
                .update({ role: newRole })
                .eq('id', userId);
            
            if (error) {
                alert('Ошибка обновления роли');
            } else {
                alert(`✅ Роль пользователя ${nickname} изменена на ${newRole}`);
                openRolePanel(); // Обновляем список
            }
        }

        // ========== REAL-TIME ПОДПИСКА ==========
        function setupRealtimeSubscription() {
            if (messageSubscription) messageSubscription.unsubscribe();
            
            messageSubscription = supabase
                .channel('messages_channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
                .subscribe();
        }

        // ========== АДМИНКА (для админов и создателя) ==========
        function openAdmin() {
            if (!currentUser) { alert('Сначала войдите'); return; }
            document.getElementById('adminModal').classList.add('active');
        }

        function adminLogin() {
            const pass = document.getElementById('adminPassword').value;
            const userRole = getUserRole(currentUser);
            
            if (userRole === 'creator' || userRole === 'admin') {
                showAdminMenu();
                document.getElementById('adminModal').classList.remove('active');
            } else if (pass === 'v2012V' || pass === 'V2012Qc-melon-xyuTebe' || pass === 'Qc2012-xyuTebe-apple') {
                showAdminMenu();
                document.getElementById('adminModal').classList.remove('active');
            } else {
                alert('Неверный пароль');
            }
            document.getElementById('adminPassword').value = '';
        }

        function showAdminMenu() {
            const userRole = getUserRole(currentUser);
            const container = document.getElementById('adminButtons');
            
            let buttons = `
                <button onclick="showUsers()">👥 Список пользователей</button>
                <button onclick="clearAllMessages()">🗑 Очистить все сообщения</button>
            `;
            
            if (userRole === 'creator' || userRole === 'admin') {
                buttons += `<button onclick="createChannel()">📢 Создать канал</button>`;
                buttons += `<button onclick="banUser()">🚫 Забанить пользователя</button>`;
            }
            
            if (userRole === 'creator') {
                buttons += `<button onclick="sendSystemMessage()">📢 Системное сообщение</button>`;
                buttons += `<button onclick="clearLocalStorage()">💣 Полный сброс БД</button>`;
            } else if (userRole === 'admin' || isHelper) {
                buttons += `<button onclick="sendSystemMessage()">📢 Системное сообщение</button>`;
            }
            
            container.innerHTML = buttons;
            document.getElementById('adminMenuModal').classList.add('active');
        }

        async function showUsers() {
            const { data, error } = await supabase.from('users').select('*');
            if (error) return;
            let list = '👥 Пользователи:\n\n';
            data.forEach(u => {
                const role = u.role || 'user';
                const roleName = { creator: 'Создатель', admin: 'Админ', helper: 'Помощник', user: 'Пользователь' }[role];
                list += `${u.nickname} (${u.username}) - ${roleName}\n`;
            });
            alert(list);
        }

        async function clearAllMessages() {
            if (confirm('Удалить все сообщения?')) {
                await supabase.from('messages').delete().neq('id', '0');
                await loadMessages();
                alert('Все сообщения удалены');
            }
        }

        async function banUser() {
            const nickname = prompt('Введите никнейм пользователя для бана:');
            if (nickname && nickname !== 'vl1doff') {
                await supabase.from('users').delete().eq('nickname', nickname);
                alert(`Пользователь ${nickname} забанен`);
            } else if (nickname === 'vl1doff') {
                alert('❌ Нельзя забанить Создателя!');
            }
        }

        async function clearLocalStorage() {
            if (confirm('ПОЛНЫЙ СБРОС БД! Все данные будут удалены. Продолжить?')) {
                await supabase.from('messages').delete().neq('id', '0');
                await supabase.from('users').delete().neq('id', '0');
                alert('База данных очищена');
                logout();
            }
        }

        async function sendSystemMessage() {
            const text = prompt('Текст системного сообщения:');
            if (text) {
                await supabase.from('messages').insert([{
                    chat_id: currentChat,
                    user_id: 'system',
                    user_nickname: '⚙️ Система',
                    user_role: 'helper',
                    text: text,
                    created_at: new Date().toISOString()
                }]);
            }
        }

        async function createChannel() {
            const name = prompt('Название канала:');
            if (name) {
                await supabase.from('channels').insert([{
                    id: 'channel_' + Date.now(),
                    name: name,
                    description: ''
                }]);
                alert(`Канал "${name}" создан`);
            }
        }

        // ========== КАНАЛЫ ==========
        async function openChannels() {
            const { data: channels } = await supabase.from('channels').select('*');
            const listDiv = document.getElementById('channelsList');
            let html = '';
            (channels || []).forEach(ch => {
                html += `<button onclick="switchToChannel('${ch.id}')" style="margin-bottom:8px;">📢 ${escapeHtml(ch.name)}</button>`;
            });
            document.getElementById('channelsList').innerHTML = html;
            document.getElementById('channelsModal').classList.add('active');
        }

        function switchToChannel(channelId) {
            currentChat = channelId;
            document.getElementById('chatTitle').innerHTML = `📢 Канал <span class="online-badge">● канал</span>`;
            loadMessages();
            setupRealtimeSubscription();
            closeModal('channelsModal');
        }

        function switchChat(type) {
            if (type === 'global') {
                currentChat = 'global';
                document.getElementById('chatTitle').innerHTML = `💬 Общий чат <span class="online-badge">● онлайн</span>`;
                loadMessages();
                setupRealtimeSubscription();
            }
        }

        // ========== ПОИСК ==========
        function openSearch() { document.getElementById('searchModal').classList.add('active'); }

        async function searchUsers() {
            const query = document.getElementById('searchQuery').value.toLowerCase();
            const { data } = await supabase.from('users').select('*');
            const results = data.filter(u => u.nickname.toLowerCase().includes(query));
            const resultsDiv = document.getElementById('searchResults');
            if (!results.length) { resultsDiv.innerHTML = '<p>❌ Не найдено</p>'; return; }
            resultsDiv.innerHTML = results.map(u => `<button onclick="startPrivateChat('${u.nickname}')">👤 ${escapeHtml(u.nickname)}</button>`).join('');
        }

        function startPrivateChat(nickname) {
            currentChat = `private_${[currentUser?.nickname, nickname].sort().join('_')}`;
            document.getElementById('chatTitle').innerHTML = `💬 Чат с ${escapeHtml(nickname)}`;
            loadMessages();
            setupRealtimeSubscription();
            closeModal('searchModal');
        }

        // ========== НАСТРОЙКИ ==========
        function openSettings() { document.getElementById('settingsModal').classList.add('active'); }
        function changeTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('solonet_theme', theme); applyTheme(); }
        async function clearChat() { if (confirm('Очистить этот чат?')) { await supabase.from('messages').delete().eq('chat_id', currentChat); await loadMessages(); } }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function updateSyncStatus(text, isSuccess) { const status = document.getElementById('syncStatus'); status.textContent = text; status.style.color = isSuccess === false ? '#ff9800' : '#4caf50'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // SQL для добавления колонки role (выполнить в SQL Editor)
        function showSQLGuide() {
            const sql = `ALTER TABLE users ADD COLUMN IF NOT EXISTS role TEXT DEFAULT 'user';`;
            console.log('Выполните в SQL Editor:\n', sql);
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            applyTheme();
            
            const savedUser = localStorage.getItem('solonet_current_user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    updateUserUI();
                    await loadMessages();
                    setupRealtimeSubscription();
                } catch(e) { showLoginModal(); }
            } else { showLoginModal(); }
            
            document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            
            // Проверка наличия колонки role
            const { error } = await supabase.from('users').select('role').limit(1);
            if (error && error.message.includes('column "role" does not exist')) {
                updateSyncStatus('⚠️ Добавьте колонку role через SQL', false);
                setTimeout(showSQLGuide, 1000);
            } else {
                updateSyncStatus('☁️ SoloNet v5.0', true);
            }
        }

        init();
    </script>
</body>
</html>
