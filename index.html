<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SoloNet Chat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #16213e;
            padding: 12px 16px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }
        .msg.mine {
            align-self: flex-end;
            background: #0f3460;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            align-self: flex-start;
            background: #2a2a4a;
            color: #ddd;
            border-bottom-left-radius: 4px;
        }
        .msg .author {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            text-align: right;
            margin-top: 4px;
        }
        .input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #0f3460;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .input-area input:focus {
            background: #1a4080;
            box-shadow: 0 0 0 2px #e94560;
        }
        .input-area button {
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            background: #e94560;
            color: #fff;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:active {
            background: #c23152;
            transform: scale(0.95);
        }
        .setup {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
            max-width: 300px;
            margin: 40px auto;
        }
        .setup input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: #fff;
            text-align: center;
        }
        .setup button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header" id="chatName">SoloNet</div>
    <div class="messages" id="msgBox"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off">
        <button onclick="send()">→</button>
    </div>

    <script>
        const CHANNEL_KEY = 'solonet_default_room';
        let nickname = localStorage.getItem('solonet_nick') || '';

        function getMessages() {
            const raw = localStorage.getItem(CHANNEL_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function saveMessages(msgs) {
            localStorage.setItem(CHANNEL_KEY, JSON.stringify(msgs));
        }

        function render() {
            const box = document.getElementById('msgBox');
            const msgs = getMessages();
            box.innerHTML = msgs.map(m => `
                <div class="msg ${m.author === nickname ? 'mine' : 'other'}">
                    <div class="author">${escapeHtml(m.author)}</div>
                    <div>${escapeHtml(m.text)}</div>
                    <div class="time">${m.time}</div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            const msgs = getMessages();
            const now = new Date();
            const time = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            msgs.push({ author: nickname, text, time });
            saveMessages(msgs);
            input.value = '';
            render();
        }

        document.getElementById('msgInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') send();
        });

        // Первый запуск — запрос ника
        if (!nickname) {
            document.body.innerHTML = `
                <div class="setup">
                    <h2 style="text-align:center;color:#e94560;">SoloNet</h2>
                    <p style="text-align:center;font-size:14px;">Введите ваш никнейм</p>
                    <input id="nickInput" placeholder="Ваш ник" maxlength="20">
                    <button onclick="setNick()">Войти в чат</button>
                </div>
            `;
            window.setNick = function() {
                const inp = document.getElementById('nickInput');
                const name = inp.value.trim();
                if (name) {
                    localStorage.setItem('solonet_nick', name);
                    location.reload();
                }
            };
        } else {
            render();
            setInterval(render, 1500); // Автообновление каждые 1.5 сек
        }
    </script>
</body>
</html>
